# Template — `bin/render-secrets.sh` renders this to alertmanager.yml (git-ignored),
# substituting ${TELEGRAM_CHAT_ID}. The bot token is read from a file (bot_token_file).
route:
  receiver: telegram
  group_by: ["alertname", "agent", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: telegram
      matchers: [severity =~ "warning|critical"]

receivers:
  - name: telegram
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_token
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ if eq .Status "firing" }}🔴 FIRING{{ else }}✅ RESOLVED{{ end }} ({{ .Alerts | len }})
          {{ range .Alerts }}<b>{{ .Labels.alertname }}</b>{{ if .Labels.agent }} · agent={{ .Labels.agent }}{{ end }}{{ if .Labels.instance }} · {{ .Labels.instance }}{{ end }}
          {{ .Annotations.summary }}
          {{ end }}

inhibit_rules:
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["alertname", "instance"]
