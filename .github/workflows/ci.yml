name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render placeholder env (no secrets in CI)
        run: cp .env.example .env
      - name: Render configs
        run: bin/render-secrets.sh || true
      - name: Static validation (compose, promtool, amtool, otel, dashboards, shellcheck)
        run: tests/validate.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets and host leaks
        run: bin/secret-scan.sh --public .
