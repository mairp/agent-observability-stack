modules:
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4

  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ip4
      fail_if_not_ssl: false
      valid_status_codes: []          # any 2xx
      tls_config:
        insecure_skip_verify: true    # gateway uses a self-signed cert
