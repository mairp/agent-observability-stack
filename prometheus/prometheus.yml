global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: agent-observability

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # --- the stack itself ---
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]   # collector-exported agent metrics
    metrics_path: /metrics

  # --- host / infra (pull) ---
  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels: { instance: "host" }

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: process-exporter
    static_configs:
      - targets: ["process-exporter:9256"]
        labels: { instance: "host" }

  # --- network connectivity & latency via blackbox (file_sd; targets are data) ---
  - job_name: blackbox-icmp
    metrics_path: /probe
    params: { module: ["icmp"] }
    file_sd_configs:
      - files: ["/etc/prometheus/targets/blackbox-icmp.yml"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-http
    metrics_path: /probe
    params: { module: ["http_2xx"] }
    file_sd_configs:
      - files: ["/etc/prometheus/targets/blackbox-http.yml"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # --- LiteLLM proxy (reached over its own docker network; /metrics is auth-guarded) ---
  - job_name: litellm
    static_configs:
      - targets: ["litellm:4000"]
    metrics_path: /metrics/
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/litellm_token

  # --- llama.cpp inference server on the RTX 3090 (reached over the shared litellm_default net) ---
  # Exposes llamacpp:* (decode/prefill tok/s, n_decode_total for the MTP acceptance proxy, queue depth).
  # No auth on llama-server /metrics; only reachable on the internal docker network.
  - job_name: llama-arc
    static_configs:
      - targets: ["llama-arc:8080"]
    metrics_path: /metrics

  # --- OpenClaw gateway diagnostics ---
  # Metrics come in via the node-exporter textfile collector: a host-side script scrapes the
  # gateway's /api/diagnostics/prometheus over LOOPBACK (firewall-allowed) and writes openclaw.prom.
  # Traces come in via the OTel plugin -> otel-collector -> Tempo.
  # (A direct https scrape of the gateway from this container would require opening :18789 to the
  #  Docker bridge in the gateway firewall; we avoid that. To enable it, allow 172.16.0.0/12 -> :18789
  #  and restore a scrape job here using secrets/openclaw_token.)

  # --- dynamic container discovery: any container labeled prometheus.scrape=true ---
  - job_name: docker-autodiscover
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        regex: "true"
        action: keep
      - source_labels: [__meta_docker_container_label_prometheus_port]
        target_label: __tmp_port
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_network_ip_address, __tmp_port]
        separator: ":"
        target_label: __address__
      - source_labels: [__meta_docker_container_label_prometheus_path]
        regex: "(.+)"
        target_label: __metrics_path__

