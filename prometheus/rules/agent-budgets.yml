# GENERATED by bin/observability-onboard.sh — do not edit by hand.
# Spend/token budgets are tracked from LiteLLM (authoritative cost source; all agents route through it).
# OpenClaw 2026.6.5 model metrics carry no per-agent label, so budgets are by model (+ a global cap).
# The onboarding step may append per-model overrides below the seed rules.
groups:
  - name: agent-budgets
    rules:
      - alert: DailySpendBudgetExceeded
        expr: sum(increase(litellm_spend_metric_total[24h])) > 5
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "Total LLM spend in last 24h over default $5 budget"

      - alert: ModelDailySpendBudgetExceeded
        expr: sum by (model) (increase(litellm_spend_metric_total[24h])) > 3
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "Model {{ $labels.model }} 24h spend over default $3 budget"
