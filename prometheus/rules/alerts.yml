groups:
  - name: host
    rules:
      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "CPU >90% for 10m on {{ $labels.instance }}"

      - alert: HostHighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Memory >90% on {{ $labels.instance }}"

      - alert: HostDiskAlmostFull
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 > 90
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Filesystem {{ $labels.mountpoint }} >90% full on {{ $labels.instance }}"

      - alert: HostHighTemp
        expr: node_hwmon_temp_celsius > 90
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Sensor {{ $labels.chip }} >90°C on {{ $labels.instance }}"

  - name: accelerators
    rules:
      - alert: NPUSaturated
        expr: rate(intel_npu_busy_time_us[5m]) / 1e6 > 0.95
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Intel NPU busy >95% for 10m on {{ $labels.instance }}"

      # Intel iGPU GPUSaturated retired 2026-06-30: inference migrated off the Arc iGPU to the
      # RTX 3090 (the iGPU is now idle). NVIDIA equivalents below.
      - alert: NvidiaGPUSaturated
        expr: nvidia_gpu_utilization_ratio > 0.95
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "RTX 3090 ({{ $labels.name }}) utilization >95% for 10m"

      - alert: NvidiaVRAMHigh
        expr: nvidia_gpu_memory_used_bytes / nvidia_gpu_memory_total_bytes > 0.95
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "RTX 3090 VRAM >95% ({{ $labels.name }}) — OOM risk for llama-server"

      - alert: NvidiaGPUHot
        expr: nvidia_gpu_temperature_celsius > 85
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "RTX 3090 ({{ $labels.name }}) >85°C for 10m"

  - name: network
    rules:
      - alert: ProbeTargetDown
        expr: probe_success == 0
        for: 3m
        labels: { severity: critical }
        annotations:
          summary: "Probe down: {{ $labels.instance }}"

      - alert: ProbeHighLatency
        expr: probe_duration_seconds > 2
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "High probe latency (>2s): {{ $labels.instance }}"

  - name: containers
    rules:
      - alert: ContainerRestartLoop
        expr: increase(container_start_time_seconds[15m]) > 3
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "Container {{ $labels.name }} restarting repeatedly"

  - name: agents
    rules:
      - alert: OpenClawGatewayDown
        expr: openclaw_diagnostics_up == 0 or absent(openclaw_diagnostics_up)
        for: 3m
        labels: { severity: critical }
        annotations:
          summary: "OpenClaw diagnostics endpoint unreachable (gateway down or token invalid)"

      - alert: ModelCallLatencyP95High
        expr: |
          histogram_quantile(0.95,
            sum by (le, model) (rate(openclaw_model_call_duration_seconds_bucket[5m]))
          ) > 45
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Model {{ $labels.model }} call p95 >45s"

      - alert: ModelCallErrorSpike
        expr: increase(openclaw_model_call_total{outcome!="completed"}[15m]) > 5
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "Model {{ $labels.model }} errors spiking (outcome={{ $labels.outcome }})"

      - alert: LiteLLMProxyDown
        expr: up{job="litellm"} == 0
        for: 3m
        labels: { severity: critical }
        annotations:
          summary: "LiteLLM proxy /metrics unreachable"

  - name: inference
    rules:
      - alert: LlamaArcDown
        expr: up{job="llama-arc"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "llama.cpp inference server (RTX 3090) /metrics unreachable"

      # Windowed decode tok/s collapses while the server is actively decoding — signals MTP
      # mis-acceptance, GPU contention, or a stuck slot (baseline is ~41 no-MTP / ~55+ with MTP).
      - alert: LlamaDecodeCollapse
        expr: |
          (rate(llamacpp:tokens_predicted_total[5m])
             / clamp_min(rate(llamacpp:tokens_predicted_seconds_total[5m]), 0.001)) < 20
          and rate(llamacpp:n_decode_total[5m]) > 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "llama.cpp decode throughput <20 tok/s for 10m while actively generating"
