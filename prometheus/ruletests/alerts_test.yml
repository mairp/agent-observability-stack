# promtool rule unit tests — `promtool test rules alerts_test.yml`
rule_files:
  - ../rules/alerts.yml
  - ../rules/agent-budgets.yml

evaluation_interval: 1m

tests:
  # Gateway-down should fire when openclaw_diagnostics_up is 0.
  - interval: 1m
    input_series:
      - series: 'openclaw_diagnostics_up'
        values: '0 0 0 0 0'
    alert_rule_test:
      - eval_time: 4m
        alertname: OpenClawGatewayDown
        exp_alerts:
          - exp_labels: { severity: critical }
            exp_annotations:
              summary: "OpenClaw diagnostics endpoint unreachable (gateway down or token invalid)"

  # Probe down should fire critical after 3m.
  - interval: 1m
    input_series:
      - series: 'probe_success{instance="1.1.1.1"}'
        values: '0 0 0 0 0'
    alert_rule_test:
      - eval_time: 4m
        alertname: ProbeTargetDown
        exp_alerts:
          - exp_labels: { severity: critical, instance: "1.1.1.1" }
            exp_annotations:
              summary: "Probe down: 1.1.1.1"

  # NVIDIA VRAM >95% should fire critical after 5m (OOM risk).
  - interval: 1m
    input_series:
      - series: 'nvidia_gpu_memory_used_bytes{gpu="0",name="NVIDIA GeForce RTX 3090"}'
        values: '24000000000x6'
      - series: 'nvidia_gpu_memory_total_bytes{gpu="0",name="NVIDIA GeForce RTX 3090"}'
        values: '25000000000x6'
    alert_rule_test:
      - eval_time: 6m
        alertname: NvidiaVRAMHigh
        exp_alerts:
          - exp_labels: { severity: critical, gpu: "0", name: "NVIDIA GeForce RTX 3090" }
            exp_annotations:
              summary: "RTX 3090 VRAM >95% (NVIDIA GeForce RTX 3090) — OOM risk for llama-server"

  # llama.cpp inference server down should fire critical after 2m.
  - interval: 1m
    input_series:
      - series: 'up{job="llama-arc"}'
        values: '0 0 0 0'
    alert_rule_test:
      - eval_time: 3m
        alertname: LlamaArcDown
        exp_alerts:
          - exp_labels: { severity: critical, job: "llama-arc" }
            exp_annotations:
              summary: "llama.cpp inference server (RTX 3090) /metrics unreachable"

  # Daily spend over $5 should fire the budget alert.
  - interval: 1m
    input_series:
      - series: 'litellm_spend_metric_total{model="gpt-5"}'
        values: '0+1x60'   # ramps to 60 over the hour -> >5 in 24h window
    alert_rule_test:
      - eval_time: 30m
        alertname: DailySpendBudgetExceeded
        exp_alerts:
          - exp_labels: { severity: warning }
            exp_annotations:
              summary: "Total LLM spend in last 24h over default $5 budget"
